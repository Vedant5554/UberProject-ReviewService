spring.application.name=UberReviewService

# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/Uber_Db_local
spring.datasource.username=root
spring.datasource.password=Ubuntu@143
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate - NONE means Flyway fully owns schema management
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Disable Spring Boot's auto Flyway ? we manage it via FlywayConfig bean
spring.flyway.enabled=false

# Logging
logging.level.org.springframework.data=DEBUG
logging.level.org.flywaydb=DEBUG

# Jackson
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false